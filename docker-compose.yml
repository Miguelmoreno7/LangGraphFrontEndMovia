services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  control-api:
    container_name: control-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/control_api.Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: control-api
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-runs:queue}
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      REQUIRE_SUPABASE_DATABASE: ${REQUIRE_SUPABASE_DATABASE:-true}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "8000"

  worker:
    container_name: worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: worker
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-runs:queue}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-2}
      WORKER_POLL_TIMEOUT_SECONDS: ${WORKER_POLL_TIMEOUT_SECONDS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REQUIRE_SUPABASE_DATABASE: ${REQUIRE_SUPABASE_DATABASE:-true}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    container_name: frontend
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      control-api:
        condition: service_healthy
    expose:
      - "80"
