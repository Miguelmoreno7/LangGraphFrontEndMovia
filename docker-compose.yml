services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: langgraph_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langgraph_platform"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  control-api:
    build:
      context: .
      dockerfile: infra/docker/control_api.Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: control-api
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/langgraph_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-runs:queue}
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_NAME: worker
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/langgraph_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-runs:queue}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-2}
      WORKER_POLL_TIMEOUT_SECONDS: ${WORKER_POLL_TIMEOUT_SECONDS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      CONTROL_API_BASE_URL: ${CONTROL_API_BASE_URL:-http://control-api:8000}
    depends_on:
      control-api:
        condition: service_started
    expose:
      - "80"

volumes:
  postgres_data:
